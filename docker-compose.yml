services:
  # --- Go API サーバー ---
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/healthcheck?sslmode=disable
      - SENTRY_DSN=${SENTRY_DSN}
      - APP_ENV=development
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # --- Next.js フロントエンド ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:3000"
    environment:
      - API_URL=http://api:8080
    depends_on:
      - api
    restart: unless-stopped

  # --- PostgreSQL データベース ---
  db:
    image: postgres:16-alpine
    # ports は公開しない（コンテナ間通信のみ）
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=healthcheck
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
